<!doctype html>
<html>
  <head>
    <script defer src="drag.js"></script>
    <script defer src="openclose.js"></script>
    <link rel="stylesheet" href="style.css" type="text/css" />
  </head>
  <body
    style="
      background-image: url(./image.png);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
    "
  >
    <div
      style="position: absolute; top: 0px; left: 0px; padding: 0px; margin: 0px"
    >
      <p style="cursor: pointer" id="welcomeopen">PepprOS</p>
      <p></p>
    </div>
    <div
      style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: solid;
        width: 256px;
        border-radius: 16px;
        padding: 32px;
        background-color: #e0e0e0;
        font-family: &quot;Verdana&quot;, sans-serif;
        padding-top: 72px;
        padding-bottom: 12px;
        overflow: hidden;
      "
      id="welcome"
    >
      <div
        id="welcomeheader"
        style="
          display: flex;
          justify-content: space-between;
          position: absolute;
          top: 0;
          border-radius: 16px 16px 0 0;
          left: -3px;
          right: -3px;
          background-color: rgba(0, 0, 0, 0.25);
          color: #fff;
          padding: 12px 16px;
        "
      >
        <p style="margin-top: 0px; margin-bottom: 0px">
          PepprOS: <span style="cursor: pointer" id="welcomeclose"> C </span>
        </p>
      </div>
      <img
        style="width: 128px; height: 128px; border-radius: 16px"
        src="https://avatars.githubusercontent.com/u/177904267?v=4"
      />
      <h1>Welcome to my WebOS!</h1>
      <h2>Why?</h2>
      <p>
        A great learning experience for a mostly CLI-based python dev, and as a
        great first step into web development!
      </p>
      <p>
        <dfn>
          Check out my <a href="https://github.com/bitpeppr">github</a>!
        </dfn>
      </p>
      <p id="timeElement">Time</p>
      <script>
        function updateTime() {
          var currentTime = new Date().toLocaleTimeString();
          document.querySelector("#timeElement").innerHTML = currentTime;
        }
        setInterval(updateTime, 1000);
      </script>
    </div>
  </body>
</html>
